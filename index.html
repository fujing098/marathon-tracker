<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Keep 马拉松赛事追踪</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#F5F5F7;min-height:100vh;}
  .wrap{max-width:390px;margin:0 auto;}
  .header{background:#fff;border-bottom:1px solid rgba(0,0,0,0.07);padding:14px 14px 0;}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#00C985,#A855F7);display:flex;align-items:center;justify-content:center;font-size:15px;}
  .logo-title{font-size:14px;font-weight:500;color:#1A1A1A;}
  .logo-sub{font-size:10px;color:#AAA;margin-top:1px;}
  .tabs{display:flex;}
  .tab{flex:1;padding:11px 0;font-size:13px;font-weight:400;color:#666;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
  .tab.active{color:#00C985;font-weight:500;border-bottom:2px solid #00C985;}
  .content{padding:12px 12px 24px;}
  .news-card{background:#fff;border:1px solid rgba(0,0,0,0.07);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .news-card a{text-decoration:none;}
  .news-title{font-size:13px;color:#1A1A1A;line-height:1.6;font-weight:500;margin-bottom:4px;}
  .news-desc{font-size:12px;color:#666;line-height:1.5;margin-bottom:6px;}
  .news-footer{display:flex;align-items:center;justify-content:space-between;}
  .news-source{font-size:11px;color:#AAA;background:#F5F5F7;padding:2px 8px;border-radius:20px;border:1px solid rgba(0,0,0,0.07);}
  .news-date{font-size:11px;color:#AAA;}
  .cat-tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px;}
  .cat-报名信息{background:rgba(0,201,133,0.08);color:#00875A;}
  .cat-赛事动态{background:rgba(250,173,20,0.08);color:#B45309;}
  .cat-成绩结果{background:rgba(168,85,247,0.08);color:#7C3AED;}
  .btn{width:100%;padding:11px;border-radius:10px;border:none;background:#00C985;color:#fff;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:14px;}
  .btn:disabled{background:#CCC;cursor:not-allowed;}
  .loading{text-align:center;padding:2rem 0;color:#AAA;font-size:13px;}
  .loading-icon{font-size:24px;margin-bottom:8px;}
  .error{padding:10px 12px;background:rgba(239,68,68,0.07);border-radius:10px;border:1px solid rgba(239,68,68,0.15);font-size:13px;color:#B91C1C;margin-bottom:12px;}
  .meta{font-size:12px;color:#AAA;margin-bottom:10px;}
  .card-top{height:3px;background:linear-gradient(90deg,#00C985,#A855F7);}
  .race-card{background:#fff;border:1px solid rgba(0,0,0,0.07);border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .race-body{padding:12px 14px;}
  .race-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .race-src{font-size:10px;color:#AAA;}
  .race-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
  .badge-reg{background:rgba(0,201,133,0.1);color:#00875A;}
  .badge-soon{background:rgba(168,85,247,0.1);color:#7C3AED;}
  .badge-closed{background:rgba(239,68,68,0.1);color:#B91C1C;}
  .race-name{font-size:15px;font-weight:500;color:#1A1A1A;margin-bottom:6px;}
  .race-info{display:flex;gap:12px;font-size:12px;color:#666;margin-bottom:10px;}
  .event-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .event-tag{font-size:11px;padding:3px 10px;border-radius:20px;}
  .tag-全程{background:rgba(0,201,133,0.1);color:#00875A;border:1px solid rgba(0,201,133,0.13);}
  .tag-半程{background:rgba(168,85,247,0.1);color:#7C3AED;border:1px solid rgba(168,85,247,0.13);}
  .weather-box{background:#F5F5F7;border-radius:10px;padding:10px;margin-bottom:10px;border:1px solid rgba(0,0,0,0.07);}
  .weather-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .weather-label{font-size:11px;color:#AAA;}
  .weather-rating{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
  .rating-绝佳{background:rgba(0,201,133,0.1);color:#00875A;}
  .rating-良好{background:rgba(250,173,20,0.1);color:#B45309;}
  .rating-挑战{background:rgba(239,68,68,0.1);color:#B91C1C;}
  .weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
  .weather-item{background:#fff;border-radius:8px;padding:7px 9px;border:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;gap:7px;}
  .weather-icon{font-size:16px;}
  .weather-val{font-size:13px;font-weight:500;color:#1A1A1A;}
  .weather-key{font-size:10px;color:#AAA;}
  .weather-tip{font-size:11px;border-radius:6px;padding:6px 8px;line-height:1.5;}
  .news-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;border-top:1px solid rgba(0,0,0,0.07);padding:8px 0 0;cursor:pointer;font-size:12px;color:#666;}
  .news-list{margin-top:8px;}
  .news-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.07);}
  .news-row:last-child{border-bottom:none;}
  .news-row-date{font-size:10px;color:#AAA;white-space:nowrap;padding-top:2px;min-width:48px;}
  .news-row-title{font-size:12px;color:#1A1A1A;line-height:1.5;}
  .filter-bar{display:flex;gap:6px;padding-bottom:10px;overflow-x:auto;}
  .filter-btn{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid rgba(0,0,0,0.07);background:transparent;color:#AAA;white-space:nowrap;}
  .filter-btn.active{font-weight:500;}
  .empty{text-align:center;padding:3rem 0;color:#AAA;font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🏃</div>
      <div>
        <div class="logo-title">Keep 赛事追踪</div>
        <div class="logo-sub" id="subtitle">共 9 场赛事</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('races')">赛事</button>
      <button class="tab" onclick="switchTab('feed')">最新消息</button>
    </div>
  </div>

  <!-- 赛事 Tab -->
  <div id="tab-races" class="content">
    <div class="filter-bar">
      <button class="filter-btn active" id="fbtn-all" onclick="filterStatus('all')">全部 9</button>
      <button class="filter-btn" id="fbtn-reg" onclick="filterStatus('reg')" style="border-color:#00C985;color:#00C985;">报名中</button>
      <button class="filter-btn" id="fbtn-up" onclick="filterStatus('up')" style="border-color:#7C3AED;color:#7C3AED;">即将报名</button>
    </div>
    <div id="race-list"></div>
  </div>

  <!-- 最新消息 Tab -->
  <div id="tab-feed" class="content" style="display:none;">
    <button class="btn" id="fetch-btn" onclick="fetchNews()">🔍 搜索最新马拉松资讯</button>
    <div id="feed-error" style="display:none;" class="error"></div>
    <div id="feed-loading" style="display:none;" class="loading"><div class="loading-icon">⏳</div>AI 正在搜索最新资讯...</div>
    <div id="feed-list"></div>
  </div>
</div>

<script>
const RACES = [
  {id:1,name:"2026厦门马拉松",date:"2026-01-04",city:"厦门",events:["全程","半程"],scale:{"全程":18000,"半程":10000},regStart:"",deadline:"",weather:{tempMin:10,tempMax:18,humidity:65,wind:"东北风 2-3级"},news:[{title:"厦马成绩公布，冠军破赛事纪录",date:"2026-01-05"},{title:"完赛率创历史新高",date:"2026-01-04"},{title:"报名18小时内额满",date:"2025-10-15"}]},
  {id:2,name:"2026武汉马拉松",date:"2026-04-05",city:"武汉",events:["全程","半程"],scale:{"全程":17000,"半程":13000},regStart:"",deadline:"",weather:{tempMin:12,tempMax:21,humidity:70,wind:"偏南风 2-3级"},news:[{title:"汉马举办，45万人报名创历史",date:"2026-04-06"},{title:"报名451431人来自69国",date:"2026-01-05"},{title:"赛事规程发布",date:"2025-12-20"}]},
  {id:3,name:"2026上海马拉松",date:"2026-12-06",city:"上海",events:["全程"],scale:{"全程":30000},regStart:"2026-04-29",deadline:"2026-05-29",weather:{tempMin:6,tempMax:14,humidity:72,wind:"东北风 2-3级"},news:[{title:"报名进行中截止5月29日",date:"2026-04-29"},{title:"赛道公布外滩出发",date:"2026-04-20"},{title:"12月6日举行规模3万人",date:"2025-12-19"}]},
  {id:4,name:"2026北京马拉松",date:"2026-10-18",city:"北京",events:["全程"],scale:{"全程":30000},regStart:"2026-07-01",deadline:"",weather:{tempMin:8,tempMax:18,humidity:40,wind:"偏北风 2-4级"},news:[{title:"暂定10月18日赛道路线公布",date:"2026-03-10"},{title:"报名7月开放规模3万人",date:"2025-12-19"}]},
  {id:5,name:"2026成都马拉松",date:"2026-10-25",city:"成都",events:["全程","半程"],scale:{"全程":20000,"半程":15000},regStart:"2026-07-15",deadline:"",weather:{tempMin:10,tempMax:19,humidity:80,wind:"微风 1-2级"},news:[{title:"赛道发布途经天府广场",date:"2026-04-01"},{title:"10月25日开跑规模3.5万",date:"2025-12-19"}]},
  {id:6,name:"2026广州马拉松",date:"2026-11-22",city:"广州",events:["全程","半程"],scale:{"全程":20000,"半程":15000},regStart:"2026-08-10",deadline:"",weather:{tempMin:16,tempMax:24,humidity:65,wind:"东北风 2-3级"},news:[{title:"官宣11月22日举行",date:"2026-02-15"},{title:"报名预计8月开放",date:"2025-12-19"}]},
  {id:7,name:"2026深圳马拉松",date:"2026-11-29",city:"深圳",events:["全程","半程"],scale:{"全程":15000,"半程":20000},regStart:"2026-08-20",deadline:"",weather:{tempMin:15,tempMax:23,humidity:68,wind:"东北风 2-3级"},news:[{title:"赛事规程发布全程1.5万人",date:"2026-01-20"},{title:"11月29日开跑报名8月开放",date:"2025-12-20"}]},
  {id:8,name:"2026杭州马拉松",date:"2026-11-01",city:"杭州",events:["全程","半程"],scale:{"全程":20000,"半程":15000},regStart:"2026-08-01",deadline:"",weather:{tempMin:9,tempMax:18,humidity:68,wind:"东北风 2-3级"},news:[{title:"赛道公布穿越西湖景区",date:"2026-04-15"},{title:"11月1日举行报名8月开放",date:"2025-12-19"}]},
  {id:9,name:"2026南京马拉松",date:"2026-11-08",city:"南京",events:["全程","半程"],scale:{"全程":15000,"半程":10000},regStart:"2026-07-20",deadline:"",weather:{tempMin:8,tempMax:17,humidity:65,wind:"东北风 2-3级"},news:[{title:"官方公布赛事日期",date:"2026-03-05"},{title:"11月8日举行规模2.5万",date:"2025-12-19"}]},
];

const FEED_NEWS = [
  {title:"2026无锡马拉松报名人数达495635人，创中国马拉松报名新高",source:"新浪体育",date:"2026-03-26",url:"",summary:"无锡马拉松半马中签率仅2.9%，武汉马拉松报名451431人，多场赛事报名超20万。",category:"报名信息"},
  {title:"2026上海马拉松报名正式开启，截止5月29日，全程规模3万人",source:"上马官网",date:"2026-04-29",url:"https://www.shang-ma.com",summary:"报名通道4月29日15:00开启，报名费200元，出签结果6月30日公布。",category:"报名信息"},
  {title:"田协发布2026年492场全国马拉松赛事目录，浙江以41场居首",source:"扬子晚报",date:"2025-12-19",url:"",summary:"2026年全国马拉松赛事492场，含254场A类、67场B类、171场C类。",category:"赛事动态"},
  {title:"北京马拉松暂定10月18日举行，报名预计7月开放",source:"闹跑",date:"2025-12-19",url:"https://www.nowrun.cn/race/12",summary:"北马全程项目为A类认证，规模3万人。",category:"赛事动态"},
];

const daysLeft = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;
const isReg = r => { const n=daysLeft(r.deadline); return n!==null&&n>=0; };
const isUp  = r => !r.deadline && !!r.regStart;
const fmt = n => n>=10000?(n/10000).toFixed(n%10000===0?0:1)+"万":n.toLocaleString();

function wRate(w) {
  let s=100,tips=[];
  if(w.tempMin<5){tips.push("起跑偏冷，需穿保暖层");s-=20;}
  else if(w.tempMin<8){tips.push("起跑微凉，建议长袖");s-=10;}
  else if(w.tempMin>18){tips.push("早晨偏热，起跑大量出汗");s-=25;}
  if(w.tempMax>25){tips.push("中后程高温，体力消耗剧增");s-=30;}
  else if(w.tempMax>20){tips.push("中后程偏热，注意补水");s-=15;}
  else if(w.tempMax<10){tips.push("全程偏冷，肌肉易僵");s-=10;}
  if(w.humidity>80){tips.push("湿度高，散热困难");s-=15;}
  else if(w.humidity>70){tips.push("湿度偏高");s-=5;}
  if(s>=85)return{label:"绝佳",tip:tips.length?tips.join("；"):"气候优越，冲PB好机会"};
  if(s>=65)return{label:"良好",tip:tips.join("；")};
  return{label:"挑战",tip:tips.join("；")};
}

let openNews = {};
let currentFilter = "all";

function filterStatus(f) {
  currentFilter = f;
  ["all","reg","up"].forEach(k => {
    const b = document.getElementById("fbtn-"+k);
    b.classList.toggle("active", k===f);
  });
  renderRaces();
}

function renderRaces() {
  const list = RACES.filter(r => {
    if(currentFilter==="reg") return isReg(r);
    if(currentFilter==="up")  return isUp(r);
    return true;
  });
  const el = document.getElementById("race-list");
  if(!list.length){ el.innerHTML='<div class="empty">🔍 暂无符合条件的赛事</div>'; return; }
  el.innerHTML = list.map(r => {
    const dl = daysLeft(r.deadline);
    const rs = r.regStart ? Math.ceil((new Date(r.regStart)-new Date())/86400000) : null;
    const total = Object.values(r.scale||{}).reduce((a,v)=>a+v,0);
    const wr = wRate(r.weather);
    const news = [...(r.news||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
    let badge = "";
    if(dl!==null&&dl>=0) badge=`<span class="race-badge badge-reg">报名还剩 ${dl} 天</span>`;
    else if(dl!==null&&dl<0) badge=`<span class="race-badge badge-closed">报名已截止</span>`;
    else if(rs!==null&&rs>0) badge=`<span class="race-badge badge-soon">${rs} 天后开报名</span>`;
    const tags = r.events.map(e=>`<span class="event-tag tag-${e}">${e}${r.scale?.[e]?" · "+fmt(r.scale[e])+"人":""}</span>`).join("");
    const newsHtml = news.map(n=>`<div class="news-row"><span class="news-row-date">${n.date.slice(5)}</span><span class="news-row-title">${n.title}</span></div>`).join("");
    return `
    <div class="race-card">
      <div class="card-top"></div>
      <div class="race-body">
        <div class="race-header"><span class="race-src">闹跑 · 历史气候</span>${badge}</div>
        <div class="race-name">${r.name}</div>
        <div class="race-info"><span>📍 ${r.city}</span><span>📅 ${r.date}</span></div>
        <div class="event-tags">${tags}<span style="font-size:11px;color:#AAA;">共 ${fmt(total)} 人</span></div>
        <div class="weather-box">
          <div class="weather-head">
            <span class="weather-label">📊 赛事期间历史气候</span>
            <span class="weather-rating rating-${wr.label}">${wr.label}</span>
          </div>
          <div class="weather-grid">
            <div class="weather-item"><span class="weather-icon">🌡️</span><div><div class="weather-val">${r.weather.tempMin}℃</div><div class="weather-key">起跑气温</div></div></div>
            <div class="weather-item"><span class="weather-icon">☀️</span><div><div class="weather-val">${r.weather.tempMax}℃</div><div class="weather-key">中后程气温</div></div></div>
            <div class="weather-item"><span class="weather-icon">💨</span><div><div class="weather-val" style="font-size:11px;">${r.weather.wind}</div><div class="weather-key">风力</div></div></div>
            <div class="weather-item"><span class="weather-icon">💧</span><div><div class="weather-val">${r.weather.humidity}%</div><div class="weather-key">湿度</div></div></div>
          </div>
          <div class="weather-tip rating-${wr.label}" style="background:${wr.label==="绝佳"?"rgba(0,201,133,0.1)":wr.label==="良好"?"rgba(250,173,20,0.1)":"rgba(239,68,68,0.1)"};">ℹ️ ${wr.tip}</div>
        </div>
        ${news.length?`
        <button class="news-toggle" onclick="toggleNews(${r.id},this)">
          <span>📰 相关资讯 <span style="color:#00C985;font-weight:500;">${news.length}</span> 条</span>
          <span id="arrow-${r.id}">▼</span>
        </button>
        <div class="news-list" id="news-${r.id}" style="display:none;">${newsHtml}</div>
        `:""}
      </div>
    </div>`;
  }).join("");
}

function toggleNews(id, btn) {
  const el = document.getElementById("news-"+id);
  const arrow = document.getElementById("arrow-"+id);
  const open = el.style.display==="none";
  el.style.display = open?"block":"none";
  arrow.textContent = open?"▲":"▼";
}

function switchTab(tab) {
  document.getElementById("tab-races").style.display = tab==="races"?"block":"none";
  document.getElementById("tab-feed").style.display  = tab==="feed"?"block":"none";
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",[" races","feed"][i]===tab));
  document.querySelectorAll(".tab")[0].classList.toggle("active", tab==="races");
  document.querySelectorAll(".tab")[1].classList.toggle("active", tab==="feed");
}

function renderFeedNews(items) {
  return items.map(n=>`
    <div class="news-card">
      ${n.category?`<span class="cat-tag cat-${n.category}">${n.category}</span>`:""}
      ${n.url?`<a href="${n.url}" target="_blank"><div class="news-title">${n.title}</div></a>`:`<div class="news-title">${n.title}</div>`}
      ${n.summary||n.desc?`<div class="news-desc">${n.summary||n.desc}</div>`:""}
      <div class="news-footer">
        <span class="news-source">${n.source}</span>
        <span class="news-date">${n.date}</span>
      </div>
    </div>`).join("");
}

async function fetchNews() {
  const btn = document.getElementById("fetch-btn");
  const errEl = document.getElementById("feed-error");
  const loadEl = document.getElementById("feed-loading");
  const listEl = document.getElementById("feed-list");
  btn.disabled = true; btn.textContent = "搜索中...";
  errEl.style.display="none"; loadEl.style.display="block"; listEl.innerHTML="";
  try {
    const res = await fetch("/api/news", { method:"POST" });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    loadEl.style.display="none";
    listEl.innerHTML = `<div class="meta">共 ${data.items.length} 条 · AI 实时搜索</div>` + renderFeedNews(data.items);
  } catch(e) {
    loadEl.style.display="none";
    errEl.style.display="block"; errEl.textContent="⚠️ "+e.message+"，展示精选资讯";
    listEl.innerHTML = `<div class="meta">精选资讯 · 共 ${FEED_NEWS.length} 条</div>` + renderFeedNews(FEED_NEWS);
  }
  btn.disabled=false; btn.textContent="🔍 搜索最新马拉松资讯";
}

// 初始化
renderRaces();
document.getElementById("feed-list").innerHTML = `<div class="meta">精选资讯 · 共 ${FEED_NEWS.length} 条</div>` + renderFeedNews(FEED_NEWS);
</script>
</body>
</html>
